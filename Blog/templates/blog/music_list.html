{% extends 'blog/base.html' %}

{% block content %}
<div class="search-container">
    <form action="{% url 'search_music' %}" method="get" class="search-form">
      {% csrf_token %}
      <div class="search-wrapper">
        <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input 
          type="text" 
          name="search" 
          class="search-input" 
          placeholder="Search for music, artists, albums..." 
          autocomplete="off"
        >
        <button type="submit" class="search-btn">
          <span>Search</span>
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="5" y1="12" x2="19" y2="12"></line>
            <polyline points="12 5 19 12 12 19"></polyline>
          </svg>
        </button>
      </div>
    </form>
  </div>
  
<section class="section">


    
    <div class="container">
    <h1 style="text-align: center;">Search Results for "{{ query }}"</h1>
    
    {% if results %}
    <div class="grid">
        {% for music in results %}
        <a href="{% url 'music_details' music.pk %}" class="card-link">
            <div class="card">
              <!-- Use {{ music }} variables, not static text -->
              <img src="{{music.cover_image.url|optimized_url}}" alt="{{ music.title }}">
              <h3>{{ music.title }}</h3>
              <p>{{ music.artist}}</p>
              <span class="tag">{{ music.genre}}</span>
            </div>
            </a>
            {% endfor %}
        </div>
    {% else %}
        <p>No results found.</p>
    {% endif %}
</div>
</section>
{% endblock %}

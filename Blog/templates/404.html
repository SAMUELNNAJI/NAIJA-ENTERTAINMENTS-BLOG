<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #740000 0%, #a20505 100%);
            color: #fff;
        }

        .container-404 {
            text-align: center;
            padding: 2rem;
            max-width: 800px;
        }

        .error-code {
            font-size: 12rem;
            font-weight: 800;
            line-height: 1;
            margin-bottom: 0.5rem;
            opacity: 0;
            animation: fadeInUp 0.6s ease forwards;
            text-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }

        .error-title {
            font-size: 1.7rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
            opacity: 0;
            animation: fadeInUp 0.6s ease 0.15s forwards;
        }

        .error-message {
            font-size: 1.1rem;
            font-weight: 600;
            opacity: 0.85;
            margin-bottom: 6rem;
            line-height: 1.5;
            opacity: 0;
            animation: fadeInUp 0.6s ease 0.3s forwards;
        }

        .btn-home {
            display: inline-block;
            margin-top: 2rem;
            padding: 14px 36px;
            background: #fff;
            color: #db0303;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1.4rem;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            opacity: 0;
            animation: fadeInUp 0.6s ease 0.45s forwards;
        }

        .btn-home:hover {
            transform: translateY(-2px);
            background-color: #a20505;
            color: #fff;
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }

        .btn-home:active {
            transform: translateY(0);
        }

        /* Floating shapes for visual interest */
        .shape {
            position: fixed;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            animation: float 20s infinite ease-in-out;
            pointer-events: none;
        }

        .shape:nth-child(1) {
            width: 80px; height: 80px;
            top: 10%; left: 10%;
            animation-delay: 0s;
        }

        .shape:nth-child(2) {
            width: 120px; height: 120px;
            top: 70%; right: 10%;
            animation-delay: -5s;
        }

        .shape:nth-child(3) {
            width: 60px; height: 60px;
            bottom: 20%; left: 20%;
            animation-delay: -10s;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(30px, -30px) rotate(120deg); }
            66% { transform: translate(-20px, 20px) rotate(240deg); }
        }

        /* Responsive */
        @media (max-width: 480px) {
            .error-code { font-size: 7rem; }
            .error-title { font-size: 1.2rem; }
            .error-message { font-size: 0.95rem; }
        }
    </style>
</head>
<body>
    <!-- Decorative background shapes -->
    <div class="shape"></div>
    <div class="shape"></div>
    <div class="shape"></div>

    <div class="container-404">
        <h2 class="error-code">404</h2>
        <p class="error-title">Page not found</p>
        <span class="error-message">We can't seem to find the page you're looking for.</span>
        <br>
        <a href="{% url 'home_page' %}" class="btn-home">Go back home</a>
    </div>
</body>
</html>
